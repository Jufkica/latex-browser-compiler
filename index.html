<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TeX Browser Compiler</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-topbar">
    <div class="topbar-brand">
      <p class="editor-kicker">Sovereign Architecturalist Interface</p>
      <h1>TeX Browser Compiler</h1>
    </div>
    <nav class="topbar-actions" aria-label="Compile actions">
      <div class="live-indicator">
        <span class="live-dot"></span>
        <span>Live Render</span>
      </div>
      <button id="loadExampleBtn" type="button" class="btn-secondary">Load template</button>
      <button id="compileBtn" type="button" class="btn-primary" disabled>Initializing...</button>
      <button id="downloadBtn" type="button" class="btn-tertiary" disabled>Download PDF</button>
      <span id="statusText" class="status">Waiting</span>
    </nav>
  </header>

  <main class="workspace">
    <section class="editor-pane">
      <div class="editor-surface">
        <div class="line-gutter" aria-hidden="true">
          <span>01</span><span>02</span><span>03</span><span>04</span><span>05</span>
          <span>06</span><span>07</span><span>08</span><span>09</span><span>10</span>
          <span>11</span><span>12</span><span>13</span><span>14</span><span>15</span>
          <span>16</span><span>17</span><span>18</span><span>19</span><span>20</span>
          <span>21</span><span>22</span><span>23</span><span>24</span><span>25</span>
          <span>26</span><span>27</span><span>28</span><span>29</span><span>30</span>
        </div>
        <textarea id="texInput" spellcheck="false" aria-label="TeX source"></textarea>
      </div>
    </section>

    <section class="preview-pane">
      <div class="paper-stage">
        <div id="pdfContainer" class="pdf-container">
          <p class="placeholder">Compile to preview your PDF here.</p>
        </div>
      </div>
    </section>
  </main>

  <section id="logPanel" class="log-panel log-panel--collapsed" aria-label="Compiler log">
    <button type="button" id="logToggle" class="log-toggle" aria-expanded="false" aria-controls="logOutput">
      <span class="log-toggle-label">Compiler log</span>
      <span class="log-toggle-hint">Technical trace</span>
      <span class="log-toggle-chevron" aria-hidden="true"></span>
    </button>
    <div class="log-panel-content">
      <pre id="logOutput"></pre>
    </div>
  </section>

  <div id="startupOverlay" class="startup-overlay" role="status" aria-live="polite">
    <div class="startup-card">
      <div class="spinner" aria-hidden="true"></div>
      <p id="startupMessage" class="startup-title">Initializing BusyTeX</p>
      <p id="startupDetail" class="startup-detail">Preparing in-browser runtime...</p>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
